<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>On-Call Assistant v1</title>
  <style>
    :root { color-scheme: light; font-family: Arial, "Microsoft YaHei", sans-serif; }
    body { margin: 0; background: #f6f8fb; color: #172033; }
    main { max-width: 960px; margin: 0 auto; padding: 32px 18px; }
    nav { display: flex; gap: 12px; margin-bottom: 22px; }
    nav a { color: #2455a6; text-decoration: none; font-weight: 700; }
    h1 { font-size: 28px; margin: 0 0 16px; }
    form { display: flex; gap: 10px; margin-bottom: 20px; }
    input { flex: 1; min-width: 0; padding: 11px 12px; border: 1px solid #b8c2d6; border-radius: 6px; font-size: 16px; }
    button { padding: 0 16px; border: 0; border-radius: 6px; background: #2455a6; color: white; font-weight: 700; cursor: pointer; }
    .result { background: white; border: 1px solid #d9e0ec; border-radius: 6px; padding: 14px; margin: 10px 0; }
    .meta { color: #5c667a; font-size: 14px; margin-bottom: 6px; }
    .empty { color: #5c667a; }
  </style>
</head>
<body>
  <main>
    <nav><a href="/v1">v1 Keyword</a><a href="/v2">v2 Semantic</a><a href="/v3">v3 Agent</a></nav>
    <h1>v1 Keyword Search</h1>
    <form id="search-form">
      <input id="query" name="q" placeholder="Search SOPs, e.g. OOM, 故障, CDN, &" autocomplete="off">
      <button type="submit">Search</button>
    </form>
    <section id="results" aria-live="polite"></section>
  </main>
  <script>
    const form = document.querySelector("#search-form");
    const input = document.querySelector("#query");
    const results = document.querySelector("#results");

    function render(items) {
      if (!items.length) {
        results.innerHTML = '<p class="empty">No results.</p>';
        return;
      }
      results.innerHTML = items.map((item) => `
        <article class="result">
          <div class="meta">${item.id} · score ${item.score}</div>
          <h2>${item.title}</h2>
          <p>${item.snippet}</p>
        </article>
      `).join("");
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const response = await fetch(`/v1/search?q=${encodeURIComponent(input.value)}`);
      const payload = await response.json();
      render(payload.results);
    });
  </script>
</body>
</html>
